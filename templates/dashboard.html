<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Bookmarks</title>
    <link rel="stylesheet" href="/static/css/style.css">
</head>
<body>

<div class="container">
    <h1>📌 Bookmarks</h1>

    <div class="bookmark-form">

    <div id="bookmarkList" class="bookmark-list"></div>
</div>

<script src="/static/js/script.js"></script>
</body>
</html>
