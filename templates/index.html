<!DOCTYPE html>
<html>
<head>
    <meta charset="UTF-8">
    <title>Loading...</title>
</head>
<body>
    <p>Loading system...</p>

    <script>
        fetch("/api/session")
            .then(res => res.json())
            .then(data => {
                if (data.logged_in) {
                    window.location.href = "/dashboard";
                } else {
                    window.location.href = "/login";
                }
            });
    </script>
</body>
</html>
